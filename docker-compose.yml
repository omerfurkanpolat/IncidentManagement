version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: incident_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: incident_management

  chromadb:
    image: chromadb/chroma:latest
    container_name: incident_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  mongo_data:
  chroma_data:
